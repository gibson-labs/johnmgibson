version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: dockerfile
    container_name: johnmgibson-dev-web
    environment:
      FLASK_ENV: development
      FLASK_APP: run.py
      PORT: 5000
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    expose:
      - "5000"
    volumes:
      - ./uploads-dev:/app/static/uploads
      - ./data-dev:/app/data
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    external: true
