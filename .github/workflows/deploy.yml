name: Deploy John Gibson Portfolio

on:
  push:
    branches: [ main, dev ]

jobs:
  deploy:
    runs-on: [ self-hosted, hostinger ]

    steps:
      - name: Clean workspace
        run: docker run --rm -v "$GITHUB_WORKSPACE:/workspace" busybox sh -c "rm -rf /workspace/data /workspace/data-dev" 2>/dev/null || true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build & deploy
        run: |
          cd "${{ github.workspace }}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            COMPOSE_FILE="docker-compose.yml"
            PROJECT_NAME="johnmgibson"
          else
            COMPOSE_FILE="docker-compose.dev.yml"
            PROJECT_NAME="johnmgibson-dev"
          fi
          docker compose -p "$PROJECT_NAME" -f "$COMPOSE_FILE" down --remove-orphans
          docker compose -p "$PROJECT_NAME" -f "$COMPOSE_FILE" build --no-cache
          docker compose -p "$PROJECT_NAME" -f "$COMPOSE_FILE" up -d --force-recreate --remove-orphans
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
